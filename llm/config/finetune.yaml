out_dir: 'out/finetune'
eval_interval: 100
log_interval: 10
eval_iters: 50
dataset: 'shakespeare_char'
learning_rate: 3.0e-4 
max_iters: 700
weight_decay: 1.0e-1
beta1: 0.9 
beta2: 0.95 
grad_clip: 1.0
decay_lr: True
warmup_iters: 50
lr_decay_iters: 700
min_lr: 3.0e-5
device: 'cpu'
num_workers: 1
batch_size: 2